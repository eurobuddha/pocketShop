<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mInbox - Pocket Shop Orders</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="mds.js"></script>
</head>
<body>
    <div class="tie-dye-bg"></div>
    
    <header class="header">
        <div class="logo">
            <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <h1>mInbox</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="inbox-container">
            <div class="inbox-tabs">
                <button class="inbox-tab active" data-view="inbox">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
                    Inbox <span class="badge" id="unread-count">0</span>
                </button>
                <button class="inbox-tab" data-view="all">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    All <span class="badge secondary" id="total-count">0</span>
                </button>
            </div>
            
            <div class="inbox-toolbar">
                <div class="status-filters">
                    <button class="filter-btn active" data-filter="ALL">All <span class="filter-count" id="filter-count-all">0</span></button>
                    <button class="filter-btn filter-paid" data-filter="PAID">Paid <span class="filter-count" id="filter-count-paid">0</span></button>
                    <button class="filter-btn filter-preparing" data-filter="PREPARING">Preparing <span class="filter-count" id="filter-count-preparing">0</span></button>
                    <button class="filter-btn filter-shipped" data-filter="SHIPPED">Shipped <span class="filter-count" id="filter-count-shipped">0</span></button>
                </div>
                <div class="toolbar-right">
                    <button class="export-btn" id="export-csv-btn" title="Export current view as CSV">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        Export CSV
                    </button>
                    <button class="refresh-btn" id="refresh-btn">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        Refresh
                    </button>
                </div>
            </div>

            <div class="inbox-list" id="inbox-list">
                <div class="empty-inbox">
                    <div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                    <p>No orders yet</p>
                    <p class="empty-hint">Orders from your shop will appear here</p>
                </div>
            </div>
        </div>
    </main>

    <div id="message-modal" class="modal hidden">
        <div class="modal-content message-detail">
            <button class="modal-close" id="modal-close">&times;</button>
            
            <div class="message-header">
                <h2 id="modal-title">Order Details</h2>
                <span class="order-ref" id="modal-ref">-</span>
            </div>
            
            <div class="message-info" id="modal-info">
            </div>
            
            <div class="status-section">
                <span class="section-label">Order Status:</span>
                <div class="status-buttons">
                    <button class="status-btn" data-status="PAID">Paid</button>
                    <button class="status-btn" data-status="PREPARING">Preparing</button>
                    <button class="status-btn" data-status="SHIPPED">Shipped</button>
                </div>
            </div>
            
            <div class="message-actions">
                <button class="action-btn" id="copy-address-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Copy Address
                </button>
                <button class="action-btn chainmail-btn" id="open-chainmail-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Open ChainMail
                </button>
            </div>
            
            <div class="message-tx">
                <span class="tx-label">TX ID:</span>
                <div class="tx-copy-row">
                    <span class="tx-id" id="modal-txid">-</span>
                    <button class="copy-btn" id="copy-txid-btn">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <footer class="footer">
        <p>Powered by Minima</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
