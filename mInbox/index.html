<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mInbox - Pocket Shop Orders</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="mds.js"></script>
</head>
<body>
    <div class="tie-dye-bg"></div>
    
    <header class="header">
        <div class="logo">
            <span class="logo-icon">📬</span>
            <h1>mInbox</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="inbox-container">
            <div class="inbox-tabs">
                <button class="inbox-tab active" data-view="inbox">
                    📥 Inbox <span class="badge" id="unread-count">0</span>
                </button>
                <button class="inbox-tab" data-view="all">
                    📋 All <span class="badge secondary" id="total-count">0</span>
                </button>
            </div>
            
            <div class="inbox-toolbar">
                <div class="status-filters">
                    <button class="filter-btn active" data-filter="ALL">All <span class="filter-count" id="filter-count-all">0</span></button>
                    <button class="filter-btn filter-paid" data-filter="PAID">Paid <span class="filter-count" id="filter-count-paid">0</span></button>
                    <button class="filter-btn filter-preparing" data-filter="PREPARING">Preparing <span class="filter-count" id="filter-count-preparing">0</span></button>
                    <button class="filter-btn filter-shipped" data-filter="SHIPPED">Shipped <span class="filter-count" id="filter-count-shipped">0</span></button>
                </div>
                <div class="toolbar-right">
                    <button class="export-btn" id="export-csv-btn" title="Export current view as CSV">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        Export CSV
                    </button>
                    <button class="refresh-btn" id="refresh-btn">🔄 Refresh</button>
                </div>
            </div>

            <div class="inbox-list" id="inbox-list">
                <div class="empty-inbox">
                    <div class="empty-icon">📭</div>
                    <p>No orders yet</p>
                    <p class="empty-hint">Orders from your shop will appear here</p>
                </div>
            </div>
        </div>
    </main>

    <div id="message-modal" class="modal hidden">
        <div class="modal-content message-detail">
            <button class="modal-close" id="modal-close">&times;</button>
            
            <div class="message-header">
                <h2 id="modal-title">Order Details</h2>
                <span class="order-ref" id="modal-ref">-</span>
            </div>
            
            <div class="message-info" id="modal-info">
            </div>
            
            <div class="status-section">
                <span class="section-label">Order Status:</span>
                <div class="status-buttons">
                    <button class="status-btn" data-status="PAID">Paid</button>
                    <button class="status-btn" data-status="PREPARING">Preparing</button>
                    <button class="status-btn" data-status="SHIPPED">Shipped</button>
                </div>
            </div>
            
            <div class="message-actions">
                <button class="action-btn" id="copy-address-btn">📋 Copy Address</button>
                <button class="action-btn chainmail-btn" id="open-chainmail-btn">💬 Open ChainMail</button>
            </div>
            
            <div class="message-tx">
                <span class="tx-label">TX ID:</span>
                <div class="tx-copy-row">
                    <span class="tx-id" id="modal-txid">-</span>
                    <button class="copy-btn" id="copy-txid-btn">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Powered by Minima</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
